dataDir: ~/.agent-orchestrator
defaults:
  agent: claude-code
  agentConfig:
    model: wafer.ai/GLM-5.1
    permissions: skip
  agentRules: "**COMMIT MESSAGE PREFIX — MANDATORY:**\nALL commits MUST use the prefix `[agento]` in the commit message.\nFormat: `[agento] type: description`\nExamples: `[agento] fix: address CR comments`,\
    \ `[agento] test: add merge gate tests`\nThis distinguishes autonomous agent work from interactive human+AI sessions. NEVER omit it.\n\n**MCP MAIL — MANDATORY PROTOCOL (non-negotiable):**\nYou MUST\
    \ send MCP mail messages for ALL tasks:\n1. IMMEDIATELY on task start: mcp__mcp-agent-mail__send_message(project_key=\"smartclaw\", sender_name=\"claude\", subject=\"Starting: <task>\", body_md=\"\
    Starting work on <task>. Will send updates every 5 min.\")\n2. Every 5 minutes: send progress update with current status\n3. IMMEDIATELY on task complete/blocked: send final message with outcome\nNote:\
    \ sender_name MUST be \"claude\" or \"agento\" (NOT \"claude-code\")\nIMPORTANT: Do NOT call mcp__mcp-agent-mail__register_agent — it will fail with a validation error. Just use send_message directly.\n\
    \n**PRE-EXIT CHECKLIST (MANDATORY before declaring ready):**\nBefore declaring a PR ready or exiting:\n1. For each open CR/Copilot inline comment, open the actual source file and confirm the fix exists\
    \ at the referenced line.\n2. Run: `gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --jq '[.[] | {path, line, body}]'`\n3. Verify each actionable comment item against the current code.\n4. Only\
    \ then post merge-ready summary.\n\n**EVIDENCE REVIEW GATE (MANDATORY before declaring merge-ready):**\nBefore declaring a PR ready to merge, run the evidence review gate:\n`PYTHONPATH=~/.smartclaw/src\
    \ python -m orchestration.evidence_review_gate <PR_NUMBER>`\nIf it exits non-zero, the PR is NOT ready — investigate and fix the evidence gap.\n\n**MCP MAIL INBOX POLLING PROTOCOL (at natural breakpoints):**\n\
    Hermes may send guidance via MCP mail. Poll inbox at natural breakpoints:\n- After completing each subtask\n- After CI check cycle completes\n- After each commit/push\n- After PR status update\nPoll\
    \ command:\n`mcp__mcp-agent-mail__fetch_inbox(project_key=\"smartclaw\", agent_name=\"<your_session_name>\", limit=5)`\nHandling:\n- guidance from hermes: apply guidance before continuing\n- abort:\
    \ stop immediately and exit cleanly\n- strategy_override: use provided strategy\n- urgent: handle urgent item first\nRules:\n- Non-blocking: if no messages, continue immediately\n- No tight loops: poll\
    \ only at natural breakpoints\n- Acknowledge guidance with a confirmation message\n\n**WHEN STUCK — ESCALATION STEPS:**\nIf blocked, before asking a human:\n1. Try 3 different approaches.\n2. Use beads\
    \ to track blocker: `br create --type task --priority 2 \"investigate: <specific>\"`\n3. Post MCP mail progress update describing what was tried and the blocker.\n\n**SLASH COMMAND DISCOVERY (for all\
    \ agents):**\nDiscover available commands by reading:\n- `~/.claude/commands/*.md` (global commands)\n- `.claude/commands/*.md` (repo-local commands)\nCollision rule: when both exist for the same command\
    \ name, repo-local `.claude/commands/*.md` overrides global.\nExecute equivalent logic based on the command's \"EXECUTION INSTRUCTIONS\" section.\nKey commands: /er (evidence review), /coderabbit or\
    \ /cr (PR comment processing), /fixpr (autonomous fixes), /tester (e2e tests).\n\n**START HERE (do this before any code changes):**\n1. Run: gh pr view --comments <PR_NUMBER> --repo <OWNER>/<REPO>\n\
    2. Run: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews | jq '.[].body'\n3. Run: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments | jq '.[] | {path:.path, line:.line, body:.body}'\nRead\
    \ ALL existing review comments (CodeRabbit, Cursor Bugbot, Copilot) before writing any code.\n\n**DEFINITION OF \"GREEN\" PR — ALL 6 must be true:**\n1. CI green — all required GitHub Actions checks\
    \ pass\n2. No merge conflicts — mergeable: MERGEABLE\n3. CodeRabbit genuinely approved — APPROVED state. If CHANGES_REQUESTED, fix comments and post `@coderabbitai all good?`\n4. Cursor Bugbot finished\
    \ — conclusion neutral/success, no blocking findings\n5. All inline AND issue comments resolved — check BOTH types:\n   - Inline: `gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments` — fix all actionable\
    \ items from CR, Copilot, Bugbot, humans\n   - Issue/conversation: `gh api repos/<OWNER>/<REPO>/issues/<PR_NUMBER>/comments` — check for human requests or bot action items\n   The lifecycle-worker runs\
    \ `checkMergeGate()` automatically which checks all of these. Your job is to FIX the issues, not verify the gate.\n6. Evidence review — run /er after criteria 1-5 are met\nNever declare green unless\
    \ all 6 are true. Post: \"PR is green ✅ (6/6 criteria met — awaiting auto-merge)\"\n\n**NEVER MERGE YOURSELF — the orchestrator merges:**\nNEVER run `gh pr merge`. The automated orchestrator runs every\
    \ 15 min and merges when all 6 criteria are met.\nYour job: get to 6/6, post the green signal, keep monitoring. Do not exit.\n\n**CI UNSTABLE / FAILURE — ACT IMMEDIATELY, NEVER PAUSE:**\nWhen mergeable_state=unstable\
    \ OR any CI check shows FAILURE or in_progress:\n- Do NOT ask for permission. Do NOT wait.\n- Immediately run: `gh run list --branch $(git branch --show-current) --repo <OWNER>/<REPO> --limit 3` to\
    \ identify the failing check\n- Then fix it with /copilot or direct code changes.\n- This is a STANDING DIRECTIVE — never pause or ask for approval when CI is unstable.\n- After pushing the fix, immediately\
    \ post `@coderabbitai all good?`\n\n**AFTER POSTING @coderabbitai all good? — KEEP MONITORING:**\nWhen you have pushed a fix and asked @coderabbitai all good?:\n- Do NOT stop and wait for human.\n-\
    \ Continue monitoring. Check CI status every 2 minutes with: `gh pr checks <PR> --watch`\n- Loop until CI is green (all checks pass) or red (definite failure).\n- If new CI failures appear: fix them,\
    \ push, and re-post @coderabbitai all good?\n- Only exit when PR is merged, closed, or you receive explicit human instruction.\n\n**MANDATORY AFTER EVERY PUSH:**\nAfter every `git push`, immediately:\n\
    1. Post exactly this comment on the PR: `@coderabbitai all good?`\n2. Wait for CodeRabbit response\n3. If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push again (do not run /er yet)\n\
    4. If CodeRabbit posts APPROVE or LGTM, run /er and wait for /er to complete before declaring done\nRepeat until CodeRabbit posts APPROVE or LGTM. Do not stop until CodeRabbit posts a **genuine** `APPROVED`\
    \ (see paired-review detection below).\n\n**VERIFY CR APPROVAL IS GENUINE — PAIRED-REVIEW DETECTION:**\nCR never posts APPROVED with body>0. After seeing CR APPROVED, check the temporal context of adjacent\
    \ reviews:\n  gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews --paginate | jq -s '[.[][] | select(.user.login==\"coderabbitai[bot]\")] | .[-2:] | map(select(. != null) | {state, body_len: (.body\
    \ // \"\" | length), submitted_at})'\n**Genuine**: COMMENTED review (body>0) posted within 10s before the APPROVED (CR's auto-review flow), or APPROVED as first/only review with no prior CHANGES_REQUESTED.\n\
    **Fake**: Orphan APPROVED following CHANGES_REQUESTED with a large time gap and no preceding COMMENTED review — triggered by thread resolution, not a real re-review.\nIf fake, post `@coderabbitai all\
    \ good?` again and wait for a genuine paired review.\n\n**POST-APPROVAL INLINE COMMENTS ARE STILL BLOCKERS (CR-specific, in addition to criterion #5):**\nAfter receiving a genuine CodeRabbit `APPROVED`,\
    \ also run:\n  gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --jq '.[] | select(.user.login==\"coderabbitai[bot]\") | {created_at,path,line,body: .body[0:200]}'\nIf CodeRabbit left any inline\
    \ comments tagged \"Major\" or \"Critical\" AFTER the APPROVE verdict timestamp, treat them as REQUEST_CHANGES — fix them, push, and post @coderabbitai all good? again.\nNote: This CR-specific check\
    \ is in addition to criterion #5's all-reviewer inline comment check (which covers Copilot, Bugbot, humans, etc.).\n\n**REAL INTEGRATION TESTS FOR EXTERNAL SERVICE CHANGES:**\nIf the PR touches any\
    \ file that makes HTTP calls or talks to an external service (embedders, APIs, webhooks, DB clients), attempt a real smoke test before pushing — not just mocks:\n- Check if the service is available\
    \ locally (e.g. `curl -s http://localhost:11434/api/tags` for Ollama)\n- If available, run the actual code path against it with a minimal input and assert the output shape is correct\n- If unavailable,\
    \ note it explicitly in the PR description under \"Testing\" — do not silently skip\nMock-only tests are insufficient for PRs that change external service client behavior.\n\n**PR NOTES:**\n- Tests\
    \ must be committed separately from implementation (not bundled in same commit).\n- Slash command discovery precedence: if both `~/.claude/commands/<name>.md` and `.claude/commands/<name>.md` exist,\
    \ repo-local `.claude/commands/` wins.\n- If using MiniMax model: use /team-mini to spin up a mini team for the implementation work.\n"
  fallbackAgents:
  - gemini
  - minimax
  modelByCli:
    claude-code:
      model: wafer.ai/GLM-5.1
    codex:
      model: gpt-5.4
    minimax:
      model: MiniMax-M2.7
    opencode:
      model: wafer.ai/GLM-5.1

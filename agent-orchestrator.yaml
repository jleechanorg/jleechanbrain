      Never use git add -A; stage only files you changed.

      Once primary code is written and the PR is ready to finalize for merge: use /copilot to process all GitHub review comments, then /fixpr to fix any remaining issues. After every push, post "@coderabbitai
      all good?" and wait for CodeRabbit.

      If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push again (do not run /er yet). If CodeRabbit posts APPROVE or LGTM AND criteria 1-5 are met, run /er and wait for /er to complete
      before declaring done. Do not stop until CodeRabbit posts APPROVE or LGTM and criteria 1-5 are met. Do NOT use /copilot or /fixpr while still actively implementing features.

      Once criteria 1-5 are met (CI green, no conflicts, CR approved, Bugbot ok, threads resolved): run /er to get an independent evidence review. Only post the green signal ("PR is green ✅ (6/6 criteria
      met — awaiting auto-merge)") after /er returns PASS.

      '
    autoMerge:
      enabled: false
    backfillAllPRs: false
    defaultBranch: main
    name: worldarchitect.ai
    path: ~/projects/worldarchitect.ai
    repo: jleechanorg/worldarchitect.ai
    scm:
      plugin: github
    sessionPrefix: wa
    workspace: worktree
    worktreeDir: ~/.worktrees/worldarchitect-main
  worldclaw-dev:
    agentRules: Build WorldClaw v1.7 in ~/worldclaw_dev per the user's detailed spec.
    backfillAllPRs: false
    defaultBranch: main
    name: worldclaw_dev
    path: ~/worldclaw_dev
    repo: jleechanorg/worldai_claw
    sessionPrefix: wc17
    workspace: worktree
    worktreeDir: ~/.worktrees/worldclaw-dev
reactions:
  agent-exited:
    action: notify
    auto: true
    priority: urgent
  agent-needs-input:
    action: send-to-agent
    auto: true
    escalateAfter: 30m
    message: You appear to be waiting. {{context}} Check the items above and continue with the next unresolved item. If everything is resolved, summarize what you completed in a PR comment.
  agent-stuck:
    action: send-to-agent
    auto: true
    escalateAfter: 1h
    message: 'You appear to be idle for 30+ minutes. {{context}} Before stopping, verify your PR is truly green: (1) gh pr view <PR_NUMBER> --repo <OWNER>/<REPO> --json mergeable,statusCheckRollup (2) Verify
      CR approval is genuine (paired-review detection): gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews --paginate | jq -s ''[.[][] | select(.user.login=="coderabbitai[bot]")] | .[-2:] | map(select(.
      != null) | {state, body_len: (.body // "" | length), submitted_at})'' — genuine = COMMENTED(body>0) within 10s before APPROVED, or first/only review with no prior CHANGES_REQUESTED. If fake, post
      @coderabbitai all good? (3) Check for post-APPROVED CR inline blockers: first get approval timestamp: APPROVAL_TS=$(gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews --paginate | jq -rs ''[.[][]
      | select(.user.login=="coderabbitai[bot]" and .state=="APPROVED")] | last | .submitted_at'') then count only post-approval blockers: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --paginate
      | jq -rs --arg ts "$APPROVAL_TS" ''[.[][] | select(.user.login=="coderabbitai[bot]") | select(.created_at > $ts) | select(.body | test("Major|Critical"))] | length'' — must be 0; pre-approval comments
      were already addressed. (4) If truly done, post a PR comment: PR is green.'
    threshold: 30m
  approved-and-green:
    action: send-to-agent
    auto: true
    message: 'CodeRabbit has approved — but VERIFY it is genuine first. Run: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews --paginate | jq -s ''[.[][] | select(.user.login=="coderabbitai[bot]")]
      | .[-2:] | map(select(. != null) | {state, body_len: (.body // "" | length), submitted_at})'' — genuine = COMMENTED(body>0) within 10s before APPROVED, or first/only review with no prior CHANGES_REQUESTED.
      If neither pattern matches, the APPROVED is fake (thread resolution). Post @coderabbitai all good? to get a real re-review. Then verify ALL 6 green conditions: (1) CI: gh pr view <PR_NUMBER> --repo
      <OWNER>/<REPO> --json statusCheckRollup --jq ''[.statusCheckRollup[]|select(.conclusion=="FAILURE")]'' must be empty. (2) Mergeable: gh pr view <PR_NUMBER> --repo <OWNER>/<REPO> --json mergeable --jq
      ''.mergeable'' must be MERGEABLE. (3) CR genuinely approved — see above. (4) Bugbot: gh pr checks <PR_NUMBER> --repo <OWNER>/<REPO> | grep -i bugbot — must show neutral or success, not failure. (5)
      ALL inline comments cleared (even post-APPROVED): first get the approval timestamp: APPROVAL_TS=$(gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews --paginate | jq -rs ''[.[][] | select(.user.login=="coderabbitai[bot]"
      and .state=="APPROVED")] | last | .submitted_at'') then count only post-approval CR blockers: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --paginate | jq -rs --arg ts "$APPROVAL_TS" ''[.[][]
      | select(.user.login=="coderabbitai[bot]") | select(.created_at > $ts) | select(.body | test("Major|Critical"))] | length'' — must be 0; pre-approval comments were already addressed by the push that
      triggered re-review. Also check ALL reviewers: use GraphQL: gh api graphql -f query=''{repository(owner:"<OWNER>",name:"<REPO>"){pullRequest(number:<PR_NUMBER>){reviewThreads(first:100){nodes{isResolved}}}}}''
      --jq ''[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved==false)] | length'' — must be 0 unresolved. (6) Evidence gate: run /er and confirm PASS. Only when all 6 pass: post
      ''PR is green — awaiting orchestrator merge.'' DO NOT run gh pr merge.'
    priority: action
  bugbot-comments:
    action: send-to-agent
    auto: true
    escalateAfter: 30m
  changes-requested:
    action: send-to-agent
    auto: true
    escalateAfter: 10m
    message: Changes have been requested on your PR. {{context}} Address each comment, push fixes, then post @coderabbitai all good?
  ci-failed:
    action: send-to-agent
    auto: true
    escalateAfter: 2
    message: CI has failed. {{context}} Fix the failing checks and push.
    retries: 3
  merge-conflicts:
    action: send-to-agent
    auto: true
    escalateAfter: 30m
    message: Your branch has merge conflicts. Rebase on the default branch, resolve all conflicts (prefer incoming changes for formatting/style, prefer your changes for functional logic), then post a PR
      comment listing each conflicted file and which side you chose and why. Push the resolved branch.
  review-requested:
    action: send-to-agent
    auto: true
    message: 'Coder agent signaled PR ready for review. Dispatch reviewer_agent to run independent review: python -m orchestration.reviewer_agent <OWNER> <REPO> <PR_NUMBER> --coder-agent <CODER_NAME>. Reviewer
      uses a different model family than the coder.'
    priority: action
  worker-signals-completion:
    action: notify
    auto: true
    skepticModel: claude
    skepticPostComment: true
worktreeDir: ~/.worktrees

spawnQueue:
  enabled: true
  maxActiveSessions: 10      # hard cap: prevents spawn storms (incident 2026-05-15)

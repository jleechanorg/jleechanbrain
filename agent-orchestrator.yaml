      before declaring done. Do not stop until CodeRabbit posts APPROVE or LGTM and criteria 1-5 are met. Do NOT use /copilot or /fixpr while still actively implementing features.

      Once criteria 1-5 are met (CI green, no conflicts, CR approved, Bugbot ok, threads resolved): run /er to get an independent evidence review. Only post the green signal ("PR is green ✅ (6/6 criteria
      met — awaiting auto-merge)") after /er returns PASS.


      **PR Priority Convention:** PR title must start with [P0], [P1], or [P2]. P0 = stops autonomy. P1 = breaks green loop. P2 = improvement.

      '
    backfillAllPRs: true
    defaultBranch: main
    name: smartclaw orchestration
    path: ${HOME}/projects/smartclaw
    repo: jleechanorg/smartclaw
    sessionPrefix: jc
    workspace: worktree

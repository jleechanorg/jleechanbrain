# Full 6/6 staging canary on a machine that runs the staging Hermes gateway.
#
# GitHub-hosted runners cannot curl localhost:18810 or load ~/.smartclaw extensions,
# so this workflow uses a self-hosted runner (typically your Mac with ai.smartclaw.staging).
#
# Setup: .github/SELFHOSTED_TEST.md
#
# Disable without removing the runner: repo variable ENABLE_STAGING_CANARY_SELFHOSTED=false
name: Staging Canary Full (self-hosted)

on:
  pull_request:
    types: [opened, synchronize, edited, reopened, ready_for_review]

concurrency:
  group: staging-canary-full-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  find-hermes-json:
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.find.outputs.found }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect hermes.json in PR diff
        id: find
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...${{ github.sha }}" 2>/dev/null || echo "")
          found=false
          for f in $CHANGED; do
            case "$f" in
              hermes.json) found=true ;;
              */hermes.json) found=true ;;
            esac
          done
          echo "found=$found" >> "$GITHUB_OUTPUT"
          echo "changed_lines=$(echo "$CHANGED" | wc -l | tr -d ' ')"

  staging-canary-full:
    name: Full canary (6/6)
    needs: find-hermes-json
    if: |
      needs.find-hermes-json.outputs.found == 'true' &&
      github.repository == 'jleechanorg/smartclaw' &&
      github.event.pull_request.head.repo.id == github.event.pull_request.base.repo.id &&
      vars.ENABLE_STAGING_CANARY_SELFHOSTED != 'false'
    runs-on: [self-hosted, hermes-staging]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run staging-canary.sh
        env:
          STAGING_CANARY_PORT: ${{ vars.STAGING_CANARY_PORT }}
          HERMES_STAGING_CONFIG: ${{ vars.HERMES_STAGING_CONFIG }}
        run: |
          set -euo pipefail
          PORT="${STAGING_CANARY_PORT:-18810}"
          if [[ -n "${HERMES_STAGING_CONFIG:-}" ]]; then
            export HERMES_STAGING_CONFIG
            echo "HERMES_STAGING_CONFIG=$HERMES_STAGING_CONFIG"
          fi
          echo "Staging canary port=$PORT"
          bash scripts/staging-canary.sh --port "$PORT"
